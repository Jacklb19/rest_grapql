name: spacex_rest_graphql
description: SpaceX Launch Tracker — REST vs GraphQL comparison app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Manejo de estado
  flutter_riverpod: ^2.5.1

  # REST client
  dio: ^5.4.3

  # GraphQL client
  graphql_flutter: ^5.2.0-beta.8

  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true